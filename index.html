<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>生日快乐</title>
  <style>
    :root {
      --bg-1: #fff4f7;
      --bg-2: #ffe8b7;
      --pink: #ff72a5;
      --rose: #ff4f8b;
      --cream: #fffaf0;
      --brown: #6f3b3b;
      --shadow: 0 24px 70px rgba(255, 100, 151, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--brown);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.95) 0 6px, transparent 7px),
        radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.8) 0 10px, transparent 11px),
        radial-gradient(circle at 78% 80%, rgba(255, 255, 255, 0.9) 0 7px, transparent 8px),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, #ff8fbd 0 4px, transparent 5px),
        radial-gradient(circle, #ffd85a 0 3px, transparent 4px),
        radial-gradient(circle, #8bdcff 0 3px, transparent 4px),
        radial-gradient(circle, #9feb9f 0 4px, transparent 5px);
      background-position: 5% 12%, 22% 78%, 75% 14%, 90% 74%;
      background-size: 180px 180px, 210px 210px, 190px 190px, 230px 230px;
      opacity: 0.5;
      animation: drift 12s linear infinite;
    }

    @keyframes drift {
      to { background-position: 5% 110%, 22% 176%, 75% 112%, 90% 172%; }
    }

    .page {
      width: min(920px, calc(100vw - 28px));
      min-height: min(720px, calc(100vh - 28px));
      display: grid;
      place-items: center;
      padding: 36px 18px;
      position: relative;
      z-index: 1;
    }

    .hero, .wheel-scene {
      width: min(760px, 100%);
      border: 4px solid rgba(255, 255, 255, 0.75);
      border-radius: 42px;
      padding: clamp(26px, 5vw, 56px);
      text-align: center;
      background: rgba(255, 250, 240, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .hero::before, .wheel-scene::before {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -42px;
      top: -42px;
      border-radius: 50%;
      background: rgba(255, 114, 165, 0.16);
    }

    .cake {
      width: 138px;
      height: 138px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 38px;
      background: linear-gradient(160deg, #fff, #ffe5ef);
      box-shadow: inset 0 -8px 0 rgba(255, 114, 165, 0.16), 0 18px 34px rgba(255, 79, 139, 0.18);
      font-size: 74px;
      animation: bounce 2.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 82px);
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--rose);
      text-shadow: 0 5px 0 #fff, 0 14px 32px rgba(255, 79, 139, 0.22);
    }

    .subtitle {
      margin: 22px auto 0;
      max-width: 560px;
      font-size: clamp(17px, 3.5vw, 24px);
      line-height: 1.7;
    }

    .primary-button, .close-button, .final-button, .settings-toggle, .save-settings {
      border: 0;
      border-radius: 999px;
      padding: 15px 28px;
      margin-top: 30px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #ff9e57);
      box-shadow: 0 14px 24px rgba(255, 105, 142, 0.32);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-button:hover, .close-button:hover, .final-button:hover, .settings-toggle:hover, .save-settings:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 18px 30px rgba(255, 105, 142, 0.4);
    }

    .wheel-scene {
      display: none;
      padding-bottom: 46px;
      overflow: visible;
    }

    .wheel-scene.show {
      display: block;
      animation: popIn 0.45s ease both;
    }

    .hero.hide {
      display: none;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .wheel-title {
      margin: 0 0 20px;
      font-size: clamp(28px, 5vw, 48px);
      color: var(--rose);
    }

    .hint {
      margin: 0 auto 24px;
      font-size: 17px;
      color: #8a5555;
    }

    .wheel-wrap {
      width: min(430px, calc(100vw - 92px));
      aspect-ratio: 1;
      margin: 8px auto 0;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(145deg, #fffdf8, #ffd8e8 48%, #eec8ff);
      box-shadow:
        inset 0 16px 18px rgba(255, 255, 255, 0.86),
        inset 0 -18px 22px rgba(165, 82, 118, 0.15),
        0 26px 0 #f2b8cb,
        0 34px 34px rgba(126, 70, 70, 0.25);
      padding: 14px;
    }

    .wheel-wrap::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 8px solid #fff;
      border-radius: 50%;
      box-shadow: inset 0 0 24px rgba(255, 122, 163, 0.22);
      pointer-events: none;
      z-index: 1;
    }

    .wheel {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      overflow: visible;
      position: relative;
      z-index: 0;
    }

    .slice {
      cursor: pointer;
      stroke: rgba(255, 255, 255, 0.96);
      stroke-width: 5;
      filter: drop-shadow(0 7px 0 rgba(132, 72, 95, 0.26)) drop-shadow(0 12px 9px rgba(120, 60, 60, 0.16));
      transform-box: fill-box;
      transform-origin: center;
      transition: filter 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .slice:hover {
      filter: brightness(1.07) saturate(1.12) drop-shadow(0 10px 0 rgba(132, 72, 95, 0.24)) drop-shadow(0 16px 13px rgba(120, 60, 60, 0.2));
      transform: translateY(-4px) scale(1.015);
    }

    .slice.opened {
      fill: #d8ced1;
      opacity: 1;
      cursor: not-allowed;
      pointer-events: none;
      filter: drop-shadow(0 3px 0 rgba(99, 70, 76, 0.18));
      stroke: rgba(255, 255, 255, 0.75);
    }

    .slice-label {
      color: #703246;
      fill: currentColor;
      font-size: 42px;
      font-weight: 900;
      paint-order: stroke fill;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 8px;
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .slice-label.opened {
      color: #8d6d73;
      font-size: 48px;
      stroke-width: 7px;
    }

    .opened-badge {
      display: none;
      fill: #8d4f5e;
      font-size: 24px;
      font-weight: 900;
      paint-order: stroke fill;
      pointer-events: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 5px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .opened-badge.show {
      display: block;
    }

    .wheel-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      border: 7px solid #fff;
      border-radius: 50%;
      color: var(--rose);
      font-size: clamp(16px, 3.4vw, 23px);
      font-weight: 900;
      background: linear-gradient(135deg, #fff9df, #ffe3ee);
      box-shadow: 0 12px 0 #f4b7c8, 0 20px 25px rgba(134, 70, 70, 0.2);
      z-index: 2;
      pointer-events: none;
    }

    .final-button {
      display: none;
      margin-top: 24px;
      margin-left: auto;
      margin-right: auto;
    }

    .final-button.show {
      display: inline-block;
      animation: popIn 0.35s ease both;
    }

    .candle-stage {
      position: absolute;
      inset: 21%;
      display: none;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 250, 224, 0.96), rgba(255, 219, 230, 0.82));
      box-shadow: 0 16px 34px rgba(255, 102, 141, 0.24);
      z-index: 3;
      pointer-events: none;
    }

    .candle-stage.show {
      display: grid;
      animation: popIn 0.45s ease both;
    }

    .wheel-wrap.celebrating {
      width: min(260px, 58vw);
      padding: 0;
      background: transparent;
      box-shadow: none;
    }

    .wheel-wrap.celebrating::before {
      display: none;
    }

    .wheel-wrap.celebrating .wheel,
    .wheel-wrap.celebrating .wheel-center {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.85);
    }

    .wheel-wrap.celebrating .candle-stage {
      inset: 0;
      background: radial-gradient(circle, rgba(255, 248, 212, 0.98), rgba(255, 220, 232, 0.78) 62%, transparent 72%);
      box-shadow: none;
    }

    .wheel-wrap.celebrating + .final-button {
      display: none;
    }

    .settings-toggle {
      margin-top: 18px;
      padding: 10px 20px;
      font-size: 15px;
      background: linear-gradient(135deg, #ffc0d8, #ffc58c);
      box-shadow: 0 10px 18px rgba(255, 105, 142, 0.22);
    }

    .settings-panel {
      display: none;
      width: min(560px, 100%);
      margin: 18px auto 0;
      padding: 18px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 26px;
      text-align: left;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 14px 28px rgba(156, 83, 96, 0.16);
    }

    .settings-panel.show {
      display: block;
      animation: popIn 0.25s ease both;
    }

    .settings-panel h3 {
      margin: 0 0 10px;
      color: var(--rose);
      font-size: 22px;
      text-align: center;
    }

    .settings-note {
      margin: 0 0 14px;
      color: #8a5555;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .settings-row,
    .gift-editor {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .settings-row label,
    .gift-editor label {
      font-weight: 800;
      color: #79494f;
    }

    .settings-row select,
    .gift-editor input,
    .gift-editor textarea {
      width: 100%;
      border: 1px solid rgba(255, 122, 163, 0.35);
      border-radius: 14px;
      padding: 10px 12px;
      color: #6f3b3b;
      font: inherit;
      background: rgba(255, 250, 250, 0.92);
      outline: none;
    }

    .gift-editor textarea {
      min-height: 70px;
      resize: vertical;
    }

    .save-settings {
      display: block;
      margin: 16px auto 0;
      padding: 10px 22px;
      font-size: 15px;
    }

    .candle {
      width: 34px;
      height: 118px;
      border-radius: 15px 15px 8px 8px;
      position: relative;
      background: repeating-linear-gradient(-35deg, #fff 0 15px, #ff9fbd 15px 29px);
      box-shadow: inset -6px 0 0 rgba(189, 69, 105, 0.12), 0 14px 24px rgba(115, 50, 62, 0.2);
    }

    .candle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -48px;
      width: 30px;
      height: 44px;
      border-radius: 50% 50% 48% 48%;
      transform: translateX(-50%);
      background: radial-gradient(circle at 50% 62%, #fff8a6 0 20%, #ffb02e 42%, #ff6a3d 74%);
      box-shadow: 0 0 26px rgba(255, 174, 55, 0.82);
      animation: flame 0.9s ease-in-out infinite alternate;
    }

    .candle::after {
      content: "许愿";
      position: absolute;
      left: 50%;
      bottom: -44px;
      transform: translateX(-50%);
      white-space: nowrap;
      color: var(--rose);
      font-size: 22px;
      font-weight: 900;
    }

    @keyframes flame {
      from { transform: translateX(-50%) scale(0.95) rotate(-3deg); }
      to { transform: translateX(-50%) scale(1.08) rotate(3deg); }
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 5;
      background: rgba(76, 36, 45, 0.24);
      backdrop-filter: blur(8px);
    }

    .modal.show {
      display: grid;
    }

    .modal.show .box-art {
      animation: shake 0.55s ease both;
    }

    .modal.show .box-lid {
      animation: openLid 0.75s 0.45s cubic-bezier(.2, .8, .2, 1) forwards;
    }

    .modal.show .gift-card {
      animation: cardUp 0.65s 1s ease forwards;
    }

    .gift-box {
      width: min(420px, 92vw);
      min-height: 360px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .box-art {
      width: 190px;
      height: 150px;
      position: relative;
    }

    .box-lid, .box-body {
      position: absolute;
      left: 0;
      right: 0;
      margin: auto;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff6b9d, #ff9e57);
      box-shadow: 0 18px 28px rgba(255, 96, 132, 0.32);
    }

    .box-lid {
      top: 0;
      width: 210px;
      height: 48px;
      transform-origin: 12% 100%;
    }

    .box-body {
      bottom: 0;
      width: 180px;
      height: 110px;
    }

    .box-lid::before, .box-body::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 34px;
      height: 100%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.72);
    }

    .box-lid::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -46px;
      width: 72px;
      height: 58px;
      border: 12px solid rgba(255, 255, 255, 0.82);
      border-radius: 50% 50% 44% 44%;
      transform: translateX(-50%) rotate(-10deg);
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
      75% { transform: rotate(-3deg); }
    }

    @keyframes openLid {
      to { transform: translate(-18px, -76px) rotate(-28deg); opacity: 0.92; }
    }

    .gift-card {
      width: min(390px, 88vw);
      padding: 28px 24px;
      border: 4px solid #fff;
      border-radius: 32px;
      text-align: center;
      background: var(--cream);
      box-shadow: var(--shadow);
      position: absolute;
      opacity: 0;
      transform: translateY(36px) scale(0.86);
    }

    @keyframes cardUp {
      to { opacity: 1; transform: translateY(-24px) scale(1); }
    }

    .gift-card h2 {
      margin: 0;
      color: var(--rose);
      font-size: 30px;
    }

    .gift-card p {
      margin: 16px 0 0;
      font-size: 19px;
      line-height: 1.7;
    }

    .close-button {
      margin-top: 22px;
      padding: 12px 22px;
      font-size: 16px;
    }

    @media (max-width: 560px) {
      .hero, .wheel-scene {
        border-radius: 30px;
        padding: 24px 10px 34px;
      }

      .wheel-title {
        margin-bottom: 14px;
      }

      .hint {
        margin-bottom: 18px;
        font-size: 16px;
      }

      .cake {
        width: 112px;
        height: 112px;
        font-size: 58px;
      }

      .wheel {
        width: 100%;
        height: auto;
      }

      .wheel-wrap {
        width: min(336px, calc(100vw - 104px));
        padding: 10px;
        box-shadow:
          inset 0 13px 16px rgba(255, 255, 255, 0.86),
          inset 0 -14px 18px rgba(165, 82, 118, 0.15),
          0 18px 0 #f2b8cb,
          0 26px 28px rgba(126, 70, 70, 0.23);
      }

      .wheel-wrap::before {
        border-width: 6px;
      }

      .wheel-center {
        border-width: 5px;
        font-size: 15px;
        box-shadow: 0 8px 0 #f4b7c8, 0 14px 18px rgba(134, 70, 70, 0.18);
      }

      .slice-label {
        font-size: 39px;
      }

      .opened-badge {
        font-size: 21px;
      }

      .settings-panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="confetti"></div>

  <main class="page">
    <section class="hero" id="hero">
      <div class="cake" aria-hidden="true">🎂</div>
      <h1>祝你生日快乐</h1>
      <p class="subtitle">亲爱的小午，22岁生日快乐！！！</p>
      <button class="primary-button" id="acceptGift">接受礼物</button>
    </section>

    <section class="wheel-scene" id="wheelScene" aria-label="礼物转盘">
      <h2 class="wheel-title">生日礼物转盘</h2>
      <p class="hint">打开专属于你的礼物盒。</p>
      <div class="wheel-wrap">
        <svg class="wheel" id="wheel" viewBox="0 0 520 520" role="img" aria-label="礼物编号转盘"></svg>
        <div class="wheel-center">选礼物</div>
        <div class="candle-stage" id="candleStage" aria-hidden="true">
          <div class="candle"></div>
        </div>
      </div>
      <button class="final-button" id="finalButton" type="button">点亮蜡烛</button>
      <button class="settings-toggle" id="settingsToggle" type="button">礼物设置</button>
      <section class="settings-panel" id="settingsPanel" aria-label="礼物设置">
        <h3>礼物设置</h3>
        <p class="settings-note">这里可以设置礼物数量和每个编号对应的内容，保存后会重新生成转盘。</p>
        <div class="settings-row">
          <label for="giftCount">礼物数量</label>
          <select id="giftCount"></select>
        </div>
        <div id="giftEditors"></div>
        <button class="save-settings" id="saveSettings" type="button">保存设置</button>
      </section>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="giftTitle">
    <div class="gift-box">
      <div class="box-art" aria-hidden="true">
        <div class="box-lid"></div>
        <div class="box-body"></div>
      </div>
      <article class="gift-card">
        <h2 id="giftTitle"></h2>
        <p id="giftDetail"></p>
        <button class="close-button" id="closeModal">再选一次</button>
      </article>
    </div>
  </div>

  <script>
    const giftSettings = {
      count: 9,
      gifts: [
        { title: "1号礼物", detail: "兑换一块你最爱的蛋糕，今天所有甜味都归你。" },
        { title: "2号礼物", detail: "一束可爱的花和一个大大的拥抱，祝你每天都被温柔包围。" },
        { title: "3号礼物", detail: "任选一部想看的电影，爆米花和快乐都安排好。" },
        { title: "4号礼物", detail: "本周任选一杯奶茶，加料不纠结，开心最重要。" },
        { title: "5号礼物", detail: "一起拍一组生日照片，把今天的可爱永久保存。" },
        { title: "6号礼物", detail: "挑一家想吃很久的店，这顿生日大餐我来安排。" },
        { title: "7号礼物", detail: "一只软乎乎的小伙伴，替我陪你度过每个放松时刻。" },
        { title: "8号礼物", detail: "送你一份只属于你的快乐歌单，循环播放好心情。" },
        { title: "9号礼物", detail: "写下一个小愿望，我会认真帮你实现一个可执行版本。" }
      ]
    };

    const colors = ["#ffd1df", "#ffe1a8", "#c9f4d6", "#cbe7ff", "#ead9ff", "#ffc6c1", "#fff0a8", "#c8fff4", "#ffd9ee"];
    const svgNamespace = "http://www.w3.org/2000/svg";
    const maxGiftCount = 9;
    let gifts = giftSettings.gifts.slice(0, Math.min(giftSettings.count, maxGiftCount));
    const openedGifts = new Set();
    const hero = document.getElementById("hero");
    const wheelScene = document.getElementById("wheelScene");
    const wheel = document.getElementById("wheel");
    const wheelWrap = document.querySelector(".wheel-wrap");
    const modal = document.getElementById("modal");
    const giftTitle = document.getElementById("giftTitle");
    const giftDetail = document.getElementById("giftDetail");
    const finalButton = document.getElementById("finalButton");
    const candleStage = document.getElementById("candleStage");
    const settingsToggle = document.getElementById("settingsToggle");
    const settingsPanel = document.getElementById("settingsPanel");
    const giftCount = document.getElementById("giftCount");
    const giftEditors = document.getElementById("giftEditors");
    const saveSettings = document.getElementById("saveSettings");

    renderWheel();
    renderSettings();

    document.getElementById("acceptGift").addEventListener("click", () => {
      hero.classList.add("hide");
      wheelScene.classList.add("show");
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      modal.classList.remove("show");
    });

    finalButton.addEventListener("click", () => {
      wheelWrap.classList.add("celebrating");
      candleStage.classList.add("show");
      playBirthdaySong();
    });

    settingsToggle.addEventListener("click", () => {
      settingsPanel.classList.toggle("show");
    });

    giftCount.addEventListener("change", () => {
      renderGiftEditors(Number(giftCount.value));
    });

    saveSettings.addEventListener("click", () => {
      const nextCount = Number(giftCount.value);
      const nextGifts = [];

      for (let index = 0; index < nextCount; index += 1) {
        const title = document.getElementById(`giftTitleInput${index}`).value.trim() || `${index + 1}号礼物`;
        const detail = document.getElementById(`giftDetailInput${index}`).value.trim() || "这是一份待填写的生日礼物。";
        nextGifts.push({ title, detail });
      }

      giftSettings.count = nextCount;
      giftSettings.gifts = nextGifts;
      gifts = giftSettings.gifts.slice(0, Math.min(giftSettings.count, maxGiftCount));
      openedGifts.clear();
      finalButton.classList.remove("show");
      candleStage.classList.remove("show");
      wheelWrap.classList.remove("celebrating");
      renderWheel();
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("show");
      }
    });

    function renderWheel() {
      wheel.innerHTML = "";
      const definitions = document.createElementNS(svgNamespace, "defs");

      gifts.forEach((_, index) => {
        const gradient = document.createElementNS(svgNamespace, "linearGradient");
        gradient.setAttribute("id", `sliceGradient${index}`);
        gradient.setAttribute("x1", "20%");
        gradient.setAttribute("y1", "0%");
        gradient.setAttribute("x2", "82%");
        gradient.setAttribute("y2", "100%");
        gradient.innerHTML = `<stop offset="0%" stop-color="#fff7fb"/><stop offset="42%" stop-color="${colors[index]}"/><stop offset="100%" stop-color="${shadeColor(colors[index], -16)}"/>`;
        definitions.appendChild(gradient);
      });

      wheel.appendChild(definitions);

      const angleSize = 360 / gifts.length;
      gifts.forEach((gift, index) => {
        const startAngle = -90 + index * angleSize;
        const endAngle = startAngle + angleSize;
        const middleAngle = startAngle + angleSize / 2;
        const group = document.createElementNS(svgNamespace, "g");
        const segment = document.createElementNS(svgNamespace, "path");
        const label = document.createElementNS(svgNamespace, "text");
        const badge = document.createElementNS(svgNamespace, "text");
        const labelPosition = polarToCartesian(260, 260, 152, middleAngle);
        const badgePosition = polarToCartesian(260, 260, 103, middleAngle);

        segment.setAttribute("d", describeSlice(260, 260, 226, startAngle, endAngle));
        segment.setAttribute("fill", `url(#sliceGradient${index})`);
        segment.setAttribute("class", "slice");
        segment.setAttribute("tabindex", "0");
        segment.setAttribute("role", "button");
        segment.setAttribute("aria-label", `${index + 1}号礼物`);
        segment.addEventListener("click", () => openGift(gift, index, segment, label, badge));
        segment.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openGift(gift, index, segment, label, badge);
          }
        });

        label.setAttribute("x", labelPosition.x);
        label.setAttribute("y", labelPosition.y);
        label.setAttribute("class", "slice-label");
        label.textContent = index + 1;

        badge.setAttribute("x", badgePosition.x);
        badge.setAttribute("y", badgePosition.y);
        badge.setAttribute("class", "opened-badge");
        badge.textContent = "已开";

        group.appendChild(segment);
        group.appendChild(label);
        group.appendChild(badge);
        wheel.appendChild(group);
      });
    }

    function openGift(gift, index, segment, label, badge) {
      if (openedGifts.has(index)) return;

      openedGifts.add(index);
      segment.classList.add("opened");
      segment.removeAttribute("tabindex");
      segment.setAttribute("aria-disabled", "true");
      label.classList.add("opened");
      label.textContent = "✓";
      badge.classList.add("show");
      giftTitle.textContent = gift.title;
      giftDetail.textContent = gift.detail;
      modal.classList.remove("show");
      void modal.offsetWidth;
      modal.classList.add("show");

      if (openedGifts.size === gifts.length) {
        finalButton.classList.add("show");
      }
    }

    function renderSettings() {
      for (let count = 1; count <= maxGiftCount; count += 1) {
        const option = document.createElement("option");
        option.value = count;
        option.textContent = `${count}个礼物`;
        giftCount.appendChild(option);
      }

      giftCount.value = gifts.length;
      renderGiftEditors(gifts.length);
    }

    function renderGiftEditors(count) {
      giftEditors.innerHTML = "";

      for (let index = 0; index < count; index += 1) {
        const gift = giftSettings.gifts[index] || { title: `${index + 1}号礼物`, detail: "" };
        const editor = document.createElement("div");
        editor.className = "gift-editor";
        editor.innerHTML = `
          <label for="giftTitleInput${index}">${index + 1}号礼物标题</label>
          <input id="giftTitleInput${index}" type="text" value="${escapeAttribute(gift.title)}" />
          <label for="giftDetailInput${index}">${index + 1}号礼物描述</label>
          <textarea id="giftDetailInput${index}">${escapeHtml(gift.detail)}</textarea>
        `;
        giftEditors.appendChild(editor);
      }
    }

    function escapeAttribute(value) {
      return value.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function escapeHtml(value) {
      return value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function describeSlice(centerX, centerY, radius, startAngle, endAngle) {
      const start = polarToCartesian(centerX, centerY, radius, endAngle);
      const end = polarToCartesian(centerX, centerY, radius, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

      return [
        "M", centerX, centerY,
        "L", start.x, start.y,
        "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y,
        "Z"
      ].join(" ");
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
      const angleInRadians = angleInDegrees * Math.PI / 180;

      return {
        x: centerX + radius * Math.cos(angleInRadians),
        y: centerY + radius * Math.sin(angleInRadians)
      };
    }

    function shadeColor(color, percent) {
      const value = parseInt(color.slice(1), 16);
      const amount = Math.round(2.55 * percent);
      const red = Math.max(0, Math.min(255, (value >> 16) + amount));
      const green = Math.max(0, Math.min(255, (value >> 8 & 0x00ff) + amount));
      const blue = Math.max(0, Math.min(255, (value & 0x0000ff) + amount));

      return `#${(0x1000000 + red * 0x10000 + green * 0x100 + blue).toString(16).slice(1)}`;
    }

    function playBirthdaySong() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const context = new AudioContext();
      const notes = [
        [392, 0.35], [392, 0.2], [440, 0.55], [392, 0.55], [523.25, 0.55], [493.88, 0.9],
        [392, 0.35], [392, 0.2], [440, 0.55], [392, 0.55], [587.33, 0.55], [523.25, 0.9],
        [392, 0.35], [392, 0.2], [783.99, 0.55], [659.25, 0.55], [523.25, 0.55], [493.88, 0.55], [440, 0.9],
        [698.46, 0.35], [698.46, 0.2], [659.25, 0.55], [523.25, 0.55], [587.33, 0.55], [523.25, 1.1]
      ];
      let startTime = context.currentTime + 0.08;

      notes.forEach(([frequency, duration]) => {
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.22, startTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration - 0.03);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
        startTime += duration + 0.04;
      });
    }
  </script>
</body>
