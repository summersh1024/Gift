<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>生日快乐</title>
  <style>
    :root {
      --cream: #fff8e8;
      --cream-deep: #ffe7bd;
      --pink: #ff8bad;
      --rose: #ee4f7c;
      --cherry: #c92e55;
      --brown: #684039;
      --mint: #bcefd9;
      --lavender: #dccbff;
      --shadow: 0 24px 60px rgba(160, 74, 89, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--brown);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 139, 173, 0.28) 0 7px, transparent 8px),
        radial-gradient(circle at 82% 14%, rgba(255, 213, 88, 0.35) 0 7px, transparent 8px),
        radial-gradient(circle at 16% 84%, rgba(133, 211, 255, 0.28) 0 6px, transparent 7px),
        radial-gradient(circle at 84% 78%, rgba(255, 139, 173, 0.2) 0 9px, transparent 10px),
        linear-gradient(145deg, #fff3f6 0%, var(--cream) 52%, var(--cream-deep) 100%);
      overflow-x: hidden;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
      background-image:
        radial-gradient(circle, #ff8bad 0 3px, transparent 4px),
        radial-gradient(circle, #ffd86b 0 3px, transparent 4px),
        radial-gradient(circle, #95dcff 0 3px, transparent 4px),
        radial-gradient(circle, #aceccf 0 3px, transparent 4px);
      background-size: 160px 180px, 220px 190px, 180px 210px, 240px 220px;
      animation: drift 13s linear infinite;
    }

    @keyframes drift {
      to { background-position: 0 180px, 0 190px, 0 210px, 0 220px; }
    }

    .page {
      width: min(900px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      position: relative;
      z-index: 1;
    }

    .screen { display: none; width: 100%; }
    .screen.show { display: block; animation: rise 0.45s ease both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: clamp(26px, 7vw, 60px) clamp(20px, 6vw, 54px);
      border: 3px solid rgba(255, 255, 255, 0.85);
      border-radius: 42px;
      text-align: center;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.82), rgba(255, 247, 225, 0.78));
      box-shadow: var(--shadow), inset 0 0 0 10px rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      right: -76px;
      top: -74px;
      border-radius: 50%;
      background: rgba(255, 139, 173, 0.17);
    }

    .cake-mark {
      width: 150px;
      height: 122px;
      margin: 0 auto 22px;
      position: relative;
      filter: drop-shadow(0 16px 22px rgba(201, 46, 85, 0.22));
    }

    .cake-top, .cake-bottom {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 22px;
    }

    .cake-top {
      top: 26px;
      width: 112px;
      height: 42px;
      background: linear-gradient(180deg, #fff, #ffd7e4);
      box-shadow: inset 0 -10px 0 rgba(255, 139, 173, 0.3);
    }

    .cake-bottom {
      bottom: 0;
      width: 150px;
      height: 70px;
      background: linear-gradient(180deg, #ffd06f, #ff946f);
      box-shadow: inset 0 -12px 0 rgba(191, 65, 78, 0.16);
    }

    .cake-mark::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -6px;
      width: 19px;
      height: 32px;
      transform: translateX(-50%);
      border-radius: 10px;
      background: repeating-linear-gradient(-35deg, #fff 0 8px, #ff8bad 8px 16px);
      z-index: 2;
    }

    .cake-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -30px;
      width: 24px;
      height: 32px;
      transform: translateX(-50%);
      border-radius: 50% 50% 46% 46%;
      background: radial-gradient(circle at 50% 62%, #fff9a3 0 20%, #ffbc35 45%, #ff6e45 78%);
      box-shadow: 0 0 22px rgba(255, 176, 46, 0.82);
      animation: flame 0.9s ease-in-out infinite alternate;
      z-index: 3;
    }

    @keyframes flame {
      from { transform: translateX(-50%) scale(0.94) rotate(-3deg); }
      to { transform: translateX(-50%) scale(1.08) rotate(3deg); }
    }

    h1, h2 {
      margin: 0;
      color: var(--cherry);
      letter-spacing: 0.06em;
      line-height: 1.15;
    }

    h1 { font-size: clamp(44px, 9vw, 78px); }
    h2 { font-size: clamp(30px, 7vw, 54px); }

    .subtitle, .hint {
      margin: 18px auto 0;
      max-width: 560px;
      color: #76514d;
      font-size: clamp(17px, 4vw, 23px);
      line-height: 1.7;
    }

    .button {
      border: 0;
      border-radius: 999px;
      padding: 15px 30px;
      margin-top: 28px;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: linear-gradient(135deg, #ee4f7c, #ff9b5f);
      box-shadow: 0 16px 28px rgba(238, 79, 124, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover { transform: translateY(-3px); box-shadow: 0 20px 32px rgba(238, 79, 124, 0.38); }
    .button.secondary { margin-top: 16px; padding: 11px 22px; font-size: 15px; background: linear-gradient(135deg, #ffb1ca, #ffc17d); }

    .gift-card {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: clamp(22px, 5vw, 42px) clamp(16px, 4vw, 36px);
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 40px;
      text-align: center;
      background: rgba(255, 251, 239, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .gift-grid {
      width: min(590px, 100%);
      margin: 28px auto 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(12px, 3vw, 20px);
    }

    .gift-box {
      min-height: 128px;
      border: 0;
      border-radius: 28px;
      cursor: pointer;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.72), rgba(255, 228, 209, 0.78));
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.62), 0 16px 22px rgba(146, 76, 76, 0.16);
      position: relative;
      display: grid;
      place-items: center;
      padding: 10px;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .gift-box:hover { transform: translateY(-5px) rotate(-1deg); filter: saturate(1.05); }

    .gift-box.opened {
      cursor: not-allowed;
      background: linear-gradient(160deg, #e2d8d5, #cfc3c2);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.5), 0 8px 14px rgba(96, 74, 76, 0.14);
      transform: none;
    }

    .box-shape {
      width: 74px;
      height: 66px;
      position: relative;
      filter: drop-shadow(0 10px 10px rgba(154, 74, 84, 0.18));
    }

    .box-shape::before, .box-shape::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 12px;
      background: linear-gradient(135deg, var(--pink), #ff9c64);
    }

    .box-shape::before { top: 0; width: 84px; height: 23px; }
    .box-shape::after { bottom: 0; width: 68px; height: 45px; }

    .ribbon {
      position: absolute;
      left: 50%;
      top: 0;
      width: 15px;
      height: 66px;
      transform: translateX(-50%);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      z-index: 2;
    }

    .gift-number {
      position: absolute;
      right: 14px;
      top: 12px;
      color: var(--cherry);
      font-size: 22px;
      font-weight: 900;
    }

    .opened-text {
      display: none;
      color: #795f62;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }

    .gift-box.opened .box-shape { display: none; }
    .gift-box.opened .opened-text { display: block; }

    .progress {
      margin-top: 22px;
      color: #7d5551;
      font-size: 16px;
      font-weight: 800;
    }

    .final-button { display: none; }
    .final-button.show { display: inline-block; animation: rise 0.35s ease both; }

    .settings-panel {
      display: none;
      width: min(580px, 100%);
      margin: 18px auto 0;
      padding: 18px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 26px;
      text-align: left;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 28px rgba(156, 83, 96, 0.16);
    }

    .settings-panel.show { display: block; }
    .settings-panel h3 { margin: 0 0 8px; color: var(--cherry); text-align: center; }
    .settings-note { margin: 0 0 14px; color: #805955; font-size: 14px; line-height: 1.6; text-align: center; }

    .settings-row, .gift-editor { display: grid; gap: 8px; margin-top: 12px; }
    .settings-row label, .gift-editor label { font-weight: 900; color: #734c49; }

    select, input, textarea {
      width: 100%;
      border: 1px solid rgba(238, 79, 124, 0.32);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--brown);
      font: inherit;
      background: rgba(255, 251, 248, 0.95);
      outline: none;
    }

    textarea { min-height: 68px; resize: vertical; }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 5;
      background: rgba(72, 38, 45, 0.28);
      backdrop-filter: blur(9px);
    }

    .modal.show { display: grid; }

    .gift-reveal {
      width: min(420px, 92vw);
      min-height: 390px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .reveal-box {
      width: 180px;
      height: 150px;
      position: relative;
      animation: shake 0.55s ease both;
    }

    .reveal-lid, .reveal-body {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 18px;
      background: linear-gradient(135deg, #ee4f7c, #ff9b5f);
      box-shadow: 0 18px 28px rgba(238, 79, 124, 0.32);
    }

    .reveal-lid { top: 0; width: 210px; height: 48px; transform-origin: 12% 100%; animation: openLid 0.75s 0.42s cubic-bezier(.2,.8,.2,1) forwards; }
    .reveal-body { bottom: 0; width: 176px; height: 112px; }
    .reveal-lid::before, .reveal-body::before { content: ""; position: absolute; left: 50%; top: 0; width: 32px; height: 100%; transform: translateX(-50%); background: rgba(255,255,255,0.76); }

    @keyframes shake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
      75% { transform: rotate(-3deg); }
    }

    @keyframes openLid { to { transform: translate(-72px, -78px) rotate(-30deg); } }

    .message-card {
      position: absolute;
      width: min(390px, 88vw);
      padding: 28px 24px;
      border: 4px solid #fff;
      border-radius: 30px;
      background: linear-gradient(160deg, #fffaf0, #fff1f6);
      text-align: center;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(40px) scale(0.86);
      animation: cardUp 0.65s 1s ease forwards;
    }

    @keyframes cardUp { to { opacity: 1; transform: translateY(-24px) scale(1); } }

    .message-card h3 { margin: 0; color: var(--cherry); font-size: 30px; }
    .message-card p { margin: 15px 0 0; font-size: 18px; line-height: 1.7; }

    .wish-screen .card { min-height: 560px; display: grid; place-items: center; }
    .wish-cake { transform: scale(1.28); margin-bottom: 38px; }
    .wish-title { margin-top: 18px; }

    @media (max-width: 560px) {
      .page { padding: 18px 12px; }
      .card, .gift-card { border-radius: 32px; }
      .gift-grid { gap: 11px; }
      .gift-box { min-height: 110px; border-radius: 22px; }
      .box-shape { width: 62px; height: 58px; }
      .box-shape::before { width: 72px; height: 20px; }
      .box-shape::after { width: 58px; height: 39px; }
      .ribbon { height: 58px; }
      .gift-number { right: 11px; top: 9px; font-size: 19px; }
      .opened-text { font-size: 16px; }
      .button { font-size: 16px; padding: 13px 24px; }
    }
  </style>
</head>
<body>
  <div class="sparkles"></div>

  <main class="page">
    <section class="screen show" id="introScreen">
      <article class="card">
        <div class="cake-mark" aria-hidden="true"><div class="cake-top"></div><div class="cake-bottom"></div></div>
        <h1>生日快乐</h1>
        <p class="subtitle">亲爱的小午，22岁生日快乐。今天的每一份惊喜，都想慢慢拆给你看。</p>
        <button class="button" id="startButton" type="button">开始拆礼物</button>
      </article>
    </section>

    <section class="screen" id="giftScreen">
      <article class="gift-card">
        <h2 id="giftHeading">拆礼物时间</h2>
        <p class="hint">每个盒子只能打开一次，全部拆完后就可以点亮生日蜡烛。</p>
        <div class="gift-grid" id="giftGrid" aria-label="礼物盒列表"></div>
        <div class="progress" id="progressText"></div>
        <button class="button final-button" id="finalButton" type="button">点亮生日蜡烛</button>
        <section class="settings-panel" id="settingsPanel" aria-label="礼物设置">
          <h3>礼物设置</h3>
          <p class="settings-note">长按“拆礼物时间”可打开这里。修改后点击保存，会重新生成礼物盒。</p>
          <div class="settings-row">
            <label for="giftCount">礼物数量</label>
            <select id="giftCount"></select>
          </div>
          <div id="giftEditors"></div>
          <button class="button secondary" id="saveSettings" type="button">保存设置</button>
        </section>
      </article>
    </section>

    <section class="screen wish-screen" id="wishScreen">
      <article class="card">
        <div>
          <div class="cake-mark wish-cake" aria-hidden="true"><div class="cake-top"></div><div class="cake-bottom"></div></div>
          <h2 class="wish-title">生日愿望已点亮</h2>
          <p class="subtitle">愿你新的一岁，被喜欢的事填满，被温柔的人包围。</p>
        </div>
      </article>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="giftTitle">
    <div class="gift-reveal">
      <div class="reveal-box" aria-hidden="true">
        <div class="reveal-lid"></div>
        <div class="reveal-body"></div>
      </div>
      <article class="message-card">
        <h3 id="giftTitle"></h3>
        <p id="giftDetail"></p>
        <button class="button secondary" id="closeModal" type="button">收下礼物</button>
      </article>
    </div>
  </div>

  <script>
    const giftSettings = {
      count: 9,
      gifts: [
        { title: "1号礼物", detail: "兑换一块你最爱的蛋糕，今天所有甜味都归你。" },
        { title: "2号礼物", detail: "一束可爱的花和一个大大的拥抱，祝你每天都被温柔包围。" },
        { title: "3号礼物", detail: "任选一部想看的电影，爆米花和快乐都安排好。" },
        { title: "4号礼物", detail: "本周任选一杯奶茶，加料不纠结，开心最重要。" },
        { title: "5号礼物", detail: "一起拍一组生日照片，把今天的可爱永久保存。" },
        { title: "6号礼物", detail: "挑一家想吃很久的店，这顿生日大餐我来安排。" },
        { title: "7号礼物", detail: "一只软乎乎的小伙伴，替我陪你度过每个放松时刻。" },
        { title: "8号礼物", detail: "送你一份只属于你的快乐歌单，循环播放好心情。" },
        { title: "9号礼物", detail: "写下一个小愿望，我会认真帮你实现一个可执行版本。" }
      ]
    };

    const maxGiftCount = 9;
    let gifts = giftSettings.gifts.slice(0, Math.min(giftSettings.count, maxGiftCount));
    const opened = new Set();

    const introScreen = document.getElementById("introScreen");
    const giftScreen = document.getElementById("giftScreen");
    const wishScreen = document.getElementById("wishScreen");
    const giftGrid = document.getElementById("giftGrid");
    const progressText = document.getElementById("progressText");
    const finalButton = document.getElementById("finalButton");
    const modal = document.getElementById("modal");
    const giftTitle = document.getElementById("giftTitle");
    const giftDetail = document.getElementById("giftDetail");
    const giftHeading = document.getElementById("giftHeading");
    const settingsPanel = document.getElementById("settingsPanel");
    const giftCount = document.getElementById("giftCount");
    const giftEditors = document.getElementById("giftEditors");

    renderGifts();
    renderSettings();

    document.getElementById("startButton").addEventListener("click", () => showScreen(giftScreen));
    document.getElementById("closeModal").addEventListener("click", () => modal.classList.remove("show"));
    modal.addEventListener("click", (event) => { if (event.target === modal) modal.classList.remove("show"); });

    finalButton.addEventListener("click", () => {
      showScreen(wishScreen);
      playBirthdaySong();
    });

    let pressTimer;
    giftHeading.addEventListener("pointerdown", () => {
      pressTimer = window.setTimeout(() => settingsPanel.classList.toggle("show"), 700);
    });
    giftHeading.addEventListener("pointerup", () => window.clearTimeout(pressTimer));
    giftHeading.addEventListener("pointerleave", () => window.clearTimeout(pressTimer));

    giftCount.addEventListener("change", () => renderGiftEditors(Number(giftCount.value)));

    document.getElementById("saveSettings").addEventListener("click", () => {
      const nextCount = Number(giftCount.value);
      const nextGifts = [];

      for (let index = 0; index < nextCount; index += 1) {
        const title = document.getElementById(`giftTitleInput${index}`).value.trim() || `${index + 1}号礼物`;
        const detail = document.getElementById(`giftDetailInput${index}`).value.trim() || "这是一份待填写的生日礼物。";
        nextGifts.push({ title, detail });
      }

      giftSettings.count = nextCount;
      giftSettings.gifts = nextGifts;
      gifts = giftSettings.gifts.slice(0, Math.min(giftSettings.count, maxGiftCount));
      opened.clear();
      settingsPanel.classList.remove("show");
      renderGifts();
    });

    function showScreen(screen) {
      [introScreen, giftScreen, wishScreen].forEach((item) => item.classList.remove("show"));
      screen.classList.add("show");
    }

    function renderGifts() {
      giftGrid.innerHTML = "";

      gifts.forEach((gift, index) => {
        const button = document.createElement("button");
        button.className = "gift-box";
        button.type = "button";
        button.setAttribute("aria-label", `${index + 1}号礼物`);
        button.innerHTML = `
          <span class="gift-number">${index + 1}</span>
          <span class="box-shape"><span class="ribbon"></span></span>
          <span class="opened-text">✓<br>已打开</span>
        `;
        button.addEventListener("click", () => openGift(index, gift, button));
        giftGrid.appendChild(button);
      });

      updateProgress();
    }

    function openGift(index, gift, button) {
      if (opened.has(index)) return;

      opened.add(index);
      button.classList.add("opened");
      button.disabled = true;
      giftTitle.textContent = gift.title;
      giftDetail.textContent = gift.detail;
      modal.classList.remove("show");
      void modal.offsetWidth;
      modal.classList.add("show");
      updateProgress();
    }

    function updateProgress() {
      progressText.textContent = `已打开 ${opened.size} / ${gifts.length} 个礼物`;
      finalButton.classList.toggle("show", opened.size === gifts.length);
    }

    function renderSettings() {
      for (let count = 1; count <= maxGiftCount; count += 1) {
        const option = document.createElement("option");
        option.value = count;
        option.textContent = `${count}个礼物`;
        giftCount.appendChild(option);
      }

      giftCount.value = gifts.length;
      renderGiftEditors(gifts.length);
    }

    function renderGiftEditors(count) {
      giftEditors.innerHTML = "";

      for (let index = 0; index < count; index += 1) {
        const gift = giftSettings.gifts[index] || { title: `${index + 1}号礼物`, detail: "" };
        const editor = document.createElement("div");
        editor.className = "gift-editor";
        editor.innerHTML = `
          <label for="giftTitleInput${index}">${index + 1}号礼物标题</label>
          <input id="giftTitleInput${index}" type="text" value="${escapeAttribute(gift.title)}" />
          <label for="giftDetailInput${index}">${index + 1}号礼物描述</label>
          <textarea id="giftDetailInput${index}">${escapeHtml(gift.detail)}</textarea>
        `;
        giftEditors.appendChild(editor);
      }
    }

    function escapeAttribute(value) {
      return value.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function escapeHtml(value) {
      return value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function playBirthdaySong() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const context = new AudioContext();
      const notes = [
        [392, 0.35], [392, 0.2], [440, 0.55], [392, 0.55], [523.25, 0.55], [493.88, 0.9],
        [392, 0.35], [392, 0.2], [440, 0.55], [392, 0.55], [587.33, 0.55], [523.25, 0.9],
        [392, 0.35], [392, 0.2], [783.99, 0.55], [659.25, 0.55], [523.25, 0.55], [493.88, 0.55], [440, 0.9],

      ];
      let startTime = context.currentTime + 0.08;

      notes.forEach(([frequency, duration]) => {
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = "triangle";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.2, startTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration - 0.03);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
        startTime += duration + 0.04;
      });
